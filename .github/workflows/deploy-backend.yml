name: Deploy Backend

on:
  push:
    tags:
      - 'backend-v*.*.*'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=backend-v0.0.0-manual" >> $GITHUB_OUTPUT
          fi

      - name: Copy backend files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/"
          target: /root/workspace/masjid-app/
          strip_components: 0

      - name: Build and restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VERSION
          script: |
            set -e
            cd /root/workspace/masjid-app/backend

            docker build -t dai-app-backend:$VERSION -t dai-app-backend:latest .

            docker rm -f api-masjid || true
            docker run -d \
              --name api-masjid \
              --restart unless-stopped \
              -p 8002:8000 \
              --env-file .env \
              -v /root/workspace/masjid-app/backend/uploads:/app/uploads \
              dai-app-backend:$VERSION

            echo "✅ Deploy success: $VERSION"
        env:
          VERSION: ${{ steps.tag.outputs.VERSION }}
